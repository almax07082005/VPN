spring:
  application:
    name: bot
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:vpn-bot-postgres}:5432/${DB_NAME:vpnbot}
    username: ${DB_USER:vpnbot}
    password: ${DB_PASSWORD:?DB_PASSWORD must be set}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: 10
    connect-retries-interval: 3s

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.pengrad.telegrambot: WARN
    okhttp3: WARN

bot:
  token: ${BOT_TOKEN:?BOT_TOKEN must be set}
  admin-tg-id: ${ADMIN_TG_ID:?ADMIN_TG_ID must be set}
  broadcast-pacing-ms: 50
  vpn:
    command-timeout-ms: ${VPN_COMMAND_TIMEOUT_MS:30000}
