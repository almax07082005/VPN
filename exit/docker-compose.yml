# Exit VM (egress hop). Deploy anywhere outside Russia.
#
# First boot generates keys and prints four handoff values to `docker logs`;
# paste them into russia/.env on the Russia VM. State lives in the named
# volume, so re-running with the same volume preserves keys and UUID.

services:
  vpn-exit:
    build:
      context: ..
      dockerfile: exit/Dockerfile
    image: vpn-exit:local
    container_name: vpn-exit
    restart: unless-stopped
    ports:
      - "443:443/tcp"
    volumes:
      - vpn-exit-data:/var/lib/vpn
    environment:
      - EXIT_PUBLIC_IP=${EXIT_PUBLIC_IP:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vpn-exit-data:
    name: vpn-exit-data
